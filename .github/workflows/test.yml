name: CI - Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:        # чтобы можно было запустить вручную

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with pytest
        run: pytest tests/ -v

      - name: Report success
        if: success()
        run: echo "✅ All tests passed!"

      - name: Report failure
        if: failure()
        run: echo "❌ Some tests failed. Check the logs."
